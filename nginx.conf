server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(),microphone=(),camera=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript image/svg+xml;
    gzip_min_length 512;

    # Cache static (none right now, but ready for /assets/)
    location ~* \.(?:css|js|svg|png|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public,immutable";
    }

    # HTML — no cache para facilitar actualizaciones
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache,must-revalidate";
    }

    # Robots
    location = /robots.txt {
        return 200 "User-agent: *\nAllow: /\nSitemap: https://gas.hn/sitemap.xml\n";
        add_header Content-Type text/plain;
    }
}
